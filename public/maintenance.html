<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メンテナンス中 — Janction</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05050f;
            --card: #0f0f24;
            --primary: #6c47ff;
            --accent: #00d4ff;
            --warn: #ffb300;
            --text: #f0f0ff;
            --text2: #9898c0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        /* animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 20% 30%, rgba(108, 71, 255, .12) 0%, transparent 70%),
                radial-gradient(ellipse 50% 30% at 80% 70%, rgba(0, 212, 255, .08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            background: var(--card);
            border: 1px solid rgba(108, 71, 255, .25);
            border-radius: 24px;
            padding: 3rem 3.5rem;
            max-width: 520px;
            width: 100%;
            text-align: center;
            box-shadow: 0 24px 64px rgba(0, 0, 0, .5), 0 0 0 1px rgba(108, 71, 255, .1);
            animation: fadein .6s ease;
        }

        @keyframes fadein {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1.25rem;
            display: block;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }
        }

        .logo {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: .5px;
            color: var(--text2);
            margin-bottom: 2rem;
        }

        .logo span {
            color: var(--primary);
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: .75rem;
            background: linear-gradient(135deg, var(--warn), #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: .95rem;
            color: var(--text2);
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .message-box {
            background: rgba(255, 179, 0, .08);
            border: 1px solid rgba(255, 179, 0, .25);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            font-size: .88rem;
            color: var(--warn);
            margin-bottom: 2rem;
            text-align: left;
              }

        .progress-bar {
            height: 3px;
            background: rgba(108, 71, 255, .2);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 2px;
            width: 60%;
            animation: progressAnim 3s ease-in-out infinite alternate;
        }

        @keyframes progressAnim {
            from {
                width: 20%;
            }

            to {
                width: 85%;
            }
        }

        .countdown {
            font-size: .8rem;
            color: var(--text2);
            margin-bottom: 2rem;
        }

        .admin-link {
            display: inline-block;
            font-size: .8rem;
            color: var(--text2);
            opacity: .5;
            transition: opacity .2s;
            text-decoration: none;
            margin-top: 1rem;
        }

        .admin-link:hover {
            opacity: 1;
            color: var(--accent);
        }

        .social-links {
            display: flex;
            gap: .75rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .social-links a {
            font-size: .8rem;
            color: var(--text2);
            text-decoration: none;
            padding: .35rem .85rem;
            border: 1px solid rgba(120, 120, 200, .2);
            border-radius: 100px;
            transition: all .2s;
        }

        .social-links a:hover {
            border-color: var(--primary);
            color: var(--text);
        }

        @media(max-width:480px) {
            .card {
                padding: 2rem 1.5rem;
            }

            h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">⚡ GPU<span>Rental</span></div>
        <span class="icon">🔧</span>
        <h1>メンテナンス中</h1>
        <p class="subtitle">
            より良いサービスをご提供するため、<br>
            只今システムメンテナンスを実施しております。
        </p>
        <div class="message-box" id="maintenanceMsg">
            ただいまメンテナンス中です。しばらくお待ちください。
        </div>
        <div class="progress-bar">
            <div class="progress-bar-fill"></div>
        </div>
        <p class="countdown" id="countdown">🕐 自動的に再接続を確認中...</p>
        <div class="social-links">
            <a href="mailto:info@metadatalab.net">📧 お問い合わせ</a>
            <a href="/landing/">🏠 トップへ戻る</a>
        </div>
        <a href="/admin/" class="admin-link">管理者の方はこちら →</a>
    </div>

    <script>
        // Auto-reload when maintenance ends
        let retryCount = 0;
        async function checkMaintenance() {
            try {
                const res = await fetch('/api/health');
                if (res.ok) {
                    const data = await res.json();
                    if (data.status === 'ok') {
                        // Try fetching a non-bypass endpoint to see if maintenance ended
                        const testRes = await fetch('/api/gpus');
                        if (testRes.status !== 503) {
                            document.getElementById('countdown').textContent = '✅ メンテナンスが完了しました。再読み込みします...';
                            setTimeout(() => location.reload(), 1500);
                            return;
                        }
                    }
                }
            } catch (e) { }
            retryCount++;
            const next = Math.min(30, 10 + retryCount * 2);
            document.getElementById('countdown').textContent = `🕐 ${next}秒後に再確認します... (${retryCount}回目)`;
            setTimeout(checkMaintenance, next * 1000);
        }

        // Load maintenance message from API if available
        fetch('/api/admin/maintenance').then(r => r.ok ? r.json() : null).then(d => {
            if (d?.message) document.getElementById('maintenanceMsg').textContent = d.message;
        }).catch(() => { });

        // Start checking after 15 seconds
        setTimeout(checkMaintenance, 15000);
        document.getElementById('countdown').textContent = '🕐 15秒後にメンテナンス終了を確認します...';
    </script>
</body>

</html>
