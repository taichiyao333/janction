<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 ページが見つかりません — Janction</title>
<meta name="robots" content="noindex">
<style>
  :root { --bg:#0a0a0f; --primary:#6c47ff; --accent:#00d4ff; --text:#e8e8f0; --text2:#9898b8; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; height: 100%; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
  
  .error-number {
    font-size: clamp(6rem, 20vw, 12rem);
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 1rem;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  
  .glitch {
    position: relative;
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 1rem;
    color: var(--text);
  }
  
  .subtitle {
    color: var(--text2);
    font-size: 1rem;
    max-width: 400px;
    line-height: 1.7;
    margin-bottom: 2.5rem;
  }
  
  .btn-group { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
  
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.875rem 1.75rem;
    border-radius: 50px;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), #8b67ff);
    color: white;
    border: none;
    box-shadow: 0 4px 20px rgba(108,71,255,0.4);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(108,71,255,0.5); }
  .btn-secondary {
    background: rgba(255,255,255,0.06);
    color: var(--text2);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.1); color: var(--text); }

  /* 浮遊するGPUアイコン */
  .gpu-icon {
    font-size: 5rem;
    margin-bottom: 1.5rem;
    animation: float 4s ease-in-out infinite;
    filter: drop-shadow(0 0 30px rgba(108,71,255,0.5));
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    33% { transform: translateY(-15px) rotate(3deg); }
    66% { transform: translateY(-8px) rotate(-2deg); }
  }
  
  /* 背景グリッド */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(108,71,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,71,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  
  .back-home { color: var(--accent); font-size: 0.85rem; margin-top: 2rem; }
  .back-home a { color: var(--accent); }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="gpu-icon">🖥️</div>
  <div class="error-number">404</div>
  <div class="glitch">ページが見つかりません</div>
  <p class="subtitle">
    お探しのページは存在しないか、移動・削除された可能性があります。<br>
    URLを確認するか、以下のリンクからお探しください。
  </p>
  
  <div class="btn-group">
    <a href="/" class="btn btn-primary">🏠 ホームへ戻る</a>
    <a href="/portal/" class="btn btn-secondary">⚡ GPU検索</a>
    <a href="/mypage/" class="btn btn-secondary">👤 マイページ</a>
  </div>
  
  <p class="back-home" style="margin-top:2rem;color:#3a3a5a;font-size:0.8rem">
    問題が続く場合は <a href="mailto:info@metadatalab.net">info@metadatalab.net</a> までご連絡ください
  </p>
</body>
</html>
